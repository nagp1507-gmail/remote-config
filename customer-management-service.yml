spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/nagarro

  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

grpc:
  server:
    port: 9091
    interceptors:
      - net.devh.boot.grpc.server.tracing.TracingServerInterceptor
  client:
    account-grpc-service:
      address: 'discovery:///ACCOUNT-MANAGEMENT-SERVICE'
      negotiation-type: plaintext
      lazy-initialization: true
      interceptors:
        - net.devh.boot.grpc.client.tracing.TracingClientInterceptor

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    home-page-url-path: ${server.servlet.context-path}
    status-page-url-path: ${server.servlet.context-path}/actuator/info
    health-check-url-path: ${server.servlet.context-path}/actuator/health

management:
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  tracing:
    propagation:
      type: W3C
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: health, info
  observations:
    enable:
      jdbc: true

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %5p traceId:%X{traceId:-} spanId:%X{spanId:-} correlationId:%X{X-Correlation-ID:-} %logger{36} - %msg%n"
